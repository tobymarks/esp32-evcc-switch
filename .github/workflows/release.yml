name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build release firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e cyd

      - name: Assemble release files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/assemble_web_installer.py \
            --build-dir .pio/build/cyd \
            --site-dir dist \
            --version "$VERSION"
          cd dist/firmware
          zip -r "../esp32-evcc-switch-cyd-$VERSION.zip" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/firmware/*.bin
            dist/firmware/manifest.json
            dist/esp32-evcc-switch-cyd-*.zip
          generate_release_notes: true
